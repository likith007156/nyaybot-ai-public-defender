services:
  - type: web
    name: nyaybot-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    name: nyaybot-frontend
    env: static
    rootDir: frontend
    buildCommand: ""
    staticPublishPath: .
    envVars:
      - key: NODE_VERSION
        value: 18.0.0
