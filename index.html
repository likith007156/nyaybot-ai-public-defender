<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NyayBot — AI Public Defender</title>
    <meta name="description"
        content="NyayBot is a free AI-powered legal information assistant covering Indian criminal law, labour rights, consumer protection, cyber crime and more.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..800;1,9..40,300..800&family=DM+Serif+Display&display=swap"
        rel="stylesheet">
    <style>
        /* ═══════ RESET ═══════ */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --navy: #0f1117;
            --navy-light: #181b24;
            --navy-mid: #252836;
            --gold: #d4a92a;
            --gold-dim: rgba(212, 169, 42, .10);
            --gold-glow: rgba(212, 169, 42, .28);
            --surface: #f7f6f2;
            --bubble-ai: #f0ede6;
            --white: #ffffff;
            --green: #34d399;
            --text: #1a1a1a;
            --text-mid: #6b6b6b;
            --text-muted: #9a9a9a;
            --heading: 'DM Serif Display', Georgia, serif;
            --body: 'DM Sans', system-ui, sans-serif;
            --radius: 14px;
            --radius-sm: 8px;
            --shadow: 0 2px 14px rgba(0, 0, 0, .07);
            --ease: 280ms cubic-bezier(.4, 0, .2, 1);
        }

        html,
        body {
            height: 100%;
            font-family: var(--body);
            background: var(--navy);
            color: var(--text);
            overflow: hidden
        }

        /* ═══════ APP SHELL ═══════ */
        #app {
            display: flex;
            height: 100vh;
            width: 100vw
        }

        /* ═══════ SIDEBAR ═══════ */
        .sidebar {
            width: 220px;
            min-width: 220px;
            background: var(--navy);
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255, 255, 255, .06);
        }

        /* Logo */
        .sidebar-logo {
            padding: 26px 18px 22px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, .06);
        }

        .shield {
            width: 40px;
            height: 40px;
            border-radius: 11px;
            background: var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 0 20px var(--gold-glow);
        }

        .shield svg {
            width: 22px;
            height: 22px;
            fill: var(--navy)
        }

        .logo-txt h1 {
            font-family: var(--heading);
            font-size: 1.18rem;
            color: #fff;
            line-height: 1.1
        }

        .logo-txt span {
            font-size: .62rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: .7px;
            font-weight: 600
        }

        /* Nav */
        .sidebar-nav {
            flex: 1;
            padding: 18px 10px;
            display: flex;
            flex-direction: column;
            gap: 3px;
            overflow-y: auto
        }

        .nav-label {
            font-size: .58rem;
            text-transform: uppercase;
            letter-spacing: 1.4px;
            color: var(--text-muted);
            padding: 6px 12px 8px;
            font-weight: 700;
        }

        .nav-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, .58);
            font-family: var(--body);
            font-size: .82rem;
            font-weight: 500;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: var(--ease);
            position: relative;
        }

        .nav-btn .ico {
            width: 22px;
            text-align: center;
            font-size: 1rem;
            flex-shrink: 0
        }

        .nav-btn::after {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 0;
            border-radius: 0 3px 3px 0;
            background: var(--green);
            transition: height var(--ease);
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, .05);
            color: #fff
        }

        .nav-btn:hover::after {
            height: 55%
        }

        .nav-btn.active {
            background: rgba(52, 211, 153, .08);
            color: var(--green);
            text-shadow: 0 0 18px rgba(52, 211, 153, .35);
        }

        .nav-btn.active::after {
            height: 55%;
            box-shadow: 0 0 6px rgba(52, 211, 153, .5)
        }

        /* Disclaimer */
        .sidebar-disclaimer {
            padding: 14px 16px;
            border-top: 1px solid rgba(255, 255, 255, .06);
            font-size: .6rem;
            color: rgba(255, 255, 255, .28);
            line-height: 1.6;
        }

        .sidebar-disclaimer strong {
            color: rgba(255, 255, 255, .45)
        }

        /* ═══════ MAIN PANEL ═══════ */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            border-radius: 18px 0 0 18px;
            overflow: hidden;
        }

        /* Topbar */
        .topbar {
            height: 60px;
            padding: 0 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--white);
            border-bottom: 1px solid rgba(0, 0, 0, .06);
            flex-shrink: 0;
        }

        .topbar-title {
            font-family: var(--heading);
            font-size: 1.1rem;
            color: var(--navy)
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 5px 14px 5px 10px;
            border-radius: 20px;
            background: rgba(52, 211, 153, .08);
            font-size: .72rem;
            color: var(--green);
            font-weight: 600;
            letter-spacing: .3px;
        }

        .status-pill .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(52, 211, 153, .5)
            }

            70% {
                box-shadow: 0 0 0 7px rgba(52, 211, 153, 0)
            }

            100% {
                box-shadow: 0 0 0 0 rgba(52, 211, 153, 0)
            }
        }

        /* ═══════ CHAT AREA ═══════ */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 28px 32px 14px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            scroll-behavior: smooth;
        }

        .chat-area::-webkit-scrollbar {
            width: 5px
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, .1);
            border-radius: 10px
        }

        /* Message rows */
        .msg-row {
            display: flex;
            gap: 10px;
            max-width: 70%;
            animation: msgIn .3s ease both
        }

        .msg-row.user {
            align-self: flex-end;
            flex-direction: row-reverse
        }

        .msg-row.ai {
            align-self: flex-start
        }

        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(16px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        /* Avatars */
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .82rem;
            font-weight: 700;
        }

        .ai .avatar {
            background: var(--gold);
            color: var(--navy)
        }

        .user .avatar {
            background: var(--navy);
            color: #fff
        }

        /* Label above AI bubble */
        .msg-label {
            font-size: .58rem;
            text-transform: uppercase;
            letter-spacing: 1.1px;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 5px;
            padding-left: 2px;
        }

        /* Bubbles */
        .bubble {
            padding: 14px 18px;
            font-size: .87rem;
            line-height: 1.7;
            word-break: break-word;
        }

        .user .bubble {
            background: var(--navy);
            color: rgba(255, 255, 255, .92);
            border-radius: var(--radius) 4px var(--radius) var(--radius);
        }

        .ai .bubble {
            background: var(--bubble-ai);
            color: var(--text);
            border-radius: 4px var(--radius) var(--radius) var(--radius);
            box-shadow: var(--shadow);
        }

        /* Timestamp */
        .msg-time {
            font-size: .58rem;
            color: var(--text-muted);
            margin-top: 4px;
            padding: 0 2px
        }

        .user .msg-time {
            text-align: right
        }

        /* Citations */
        .citations {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 12px
        }

        .cite {
            display: inline-flex;
            align-items: center;
            background: var(--gold-dim);
            color: var(--gold);
            border: 1px solid rgba(212, 169, 42, .2);
            font-size: .66rem;
            font-weight: 700;
            padding: 4px 11px;
            border-radius: 20px;
            letter-spacing: .3px;
            cursor: default;
            transition: var(--ease);
        }

        .cite:hover {
            background: var(--gold);
            color: var(--navy);
            border-color: var(--gold)
        }

        /* Suggestion chips */
        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px 0 6px 42px;
            animation: msgIn .35s ease both;
        }

        .chip {
            background: var(--white);
            border: 1.5px solid rgba(0, 0, 0, .08);
            font-family: var(--body);
            font-size: .78rem;
            color: var(--navy);
            padding: 9px 18px;
            border-radius: 22px;
            cursor: pointer;
            font-weight: 500;
            transition: var(--ease);
            box-shadow: 0 1px 4px rgba(0, 0, 0, .04);
        }

        .chip:hover {
            border-color: var(--gold);
            color: var(--gold);
            box-shadow: 0 2px 12px var(--gold-glow);
            transform: translateY(-1px);
        }

        /* Typing indicator */
        .typing-row {
            display: flex;
            gap: 10px;
            align-self: flex-start;
            max-width: 70%;
            animation: msgIn .25s ease both;
        }

        .typing-dots {
            display: flex;
            gap: 5px;
            padding: 16px 22px;
            background: var(--bubble-ai);
            border-radius: 4px var(--radius) var(--radius) var(--radius);
            box-shadow: var(--shadow);
        }

        .typing-dots span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: bounce .9s infinite;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: .15s
        }

        .typing-dots span:nth-child(3) {
            animation-delay: .3s
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: translateY(0);
                opacity: .35
            }

            40% {
                transform: translateY(-7px);
                opacity: 1
            }
        }

        /* ═══════ INPUT AREA ═══════ */
        .input-area {
            padding: 12px 28px 16px;
            border-top: 1px solid rgba(0, 0, 0, .06);
            background: var(--white);
            flex-shrink: 0;
        }

        .input-wrap {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            background: var(--surface);
            border: 1.5px solid rgba(0, 0, 0, .08);
            border-radius: 16px;
            padding: 6px 6px 6px 18px;
            transition: border-color var(--ease), box-shadow var(--ease);
        }

        .input-wrap:focus-within {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px var(--gold-glow);
        }

        #user-input {
            flex: 1;
            border: none;
            outline: none;
            resize: none;
            font-family: var(--body);
            font-size: .87rem;
            background: transparent;
            color: var(--text);
            min-height: 24px;
            max-height: 120px;
            line-height: 1.55;
            padding: 8px 0;
        }

        #user-input::placeholder {
            color: var(--text-muted)
        }

        #send-btn {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            border: none;
            background: var(--navy);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: var(--ease);
        }

        #send-btn:hover {
            background: #1a1e2b;
            transform: scale(1.06)
        }

        #send-btn:active {
            transform: scale(.94)
        }

        #send-btn svg {
            width: 18px;
            height: 18px
        }

        .input-hint {
            text-align: center;
            font-size: .62rem;
            color: var(--text-muted);
            margin-top: 8px;
            letter-spacing: .2px;
        }

        /* ═══════ RESPONSIVE ═══════ */
        @media(max-width:700px) {
            .sidebar {
                display: none
            }

            .main {
                border-radius: 0
            }

            .chat-area {
                padding: 16px
            }

            .msg-row {
                max-width: 92%
            }

            .chips {
                padding-left: 42px
            }
        }
    </style>
</head>

<body>

    <div id="app">

        <!-- ═══ SIDEBAR ═══ -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <div class="shield">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 2.18l7 3.12v4.7c0 4.67-3.13 9.06-7 10.2-3.87-1.14-7-5.53-7-10.2V6.3l7-3.12z" />
                    </svg>
                </div>
                <div class="logo-txt">
                    <h1>NyayBot</h1>
                    <span>AI Legal Assistant</span>
                </div>
            </div>

            <nav class="sidebar-nav" id="sidebar-nav">
                <div class="nav-label">Legal Areas</div>
                <button class="nav-btn active" data-topic="Criminal Law"><span class="ico">⚖️</span>Criminal
                    Law</button>
                <button class="nav-btn" data-topic="Labour Rights"><span class="ico">🏗️</span>Labour Rights</button>
                <button class="nav-btn" data-topic="Consumer Protection"><span class="ico">🛡️</span>Consumer
                    Protection</button>
                <button class="nav-btn" data-topic="Women Safety"><span class="ico">👩‍⚖️</span>Women Safety</button>
                <button class="nav-btn" data-topic="Cyber Crime"><span class="ico">💻</span>Cyber Crime</button>
                <button class="nav-btn" data-topic="Property Disputes"><span class="ico">🏠</span>Property
                    Disputes</button>
                <button class="nav-btn" data-topic="RTI"><span class="ico">📄</span>RTI</button>
            </nav>

            <div class="sidebar-disclaimer">
                ⚠️ NyayBot provides <strong>general legal information</strong> only. This is not legal advice. Always
                consult a qualified lawyer for your specific situation.
            </div>
        </aside>

        <!-- ═══ MAIN ═══ -->
        <main class="main">
            <header class="topbar">
                <div class="topbar-title" id="topbar-title">Criminal Law</div>
                <div class="status-pill"><span class="dot"></span>AI Online</div>
            </header>

            <div class="chat-area" id="chat-area"></div>

            <div class="input-area">
                <div class="input-wrap">
                    <textarea id="user-input" rows="1" placeholder="Describe your legal situation in plain language…"
                        aria-label="Type your legal question"></textarea>
                    <button id="send-btn" aria-label="Send message">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                        </svg>
                    </button>
                </div>
                <p class="input-hint">Free legal information · Powered by AI · Not a substitute for a lawyer</p>
            </div>
        </main>
    </div>

    <script>
        (function () {
            /* ═══ DOM refs ═══ */
            const chatArea = document.getElementById('chat-area');
            const userInput = document.getElementById('user-input');
            const sendBtn = document.getElementById('send-btn');
            const topbarTitle = document.getElementById('topbar-title');
            const navBtns = document.querySelectorAll('.nav-btn');

            let busy = false;

            /* ═══ Sidebar nav ═══ */
            navBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    navBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    topbarTitle.textContent = btn.dataset.topic;
                });
            });

            /* ═══ Auto-resize textarea ═══ */
            userInput.addEventListener('input', () => {
                userInput.style.height = 'auto';
                userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
            });

            /* ═══ Send handling ═══ */
            sendBtn.addEventListener('click', send);
            userInput.addEventListener('keydown', e => {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
            });

            function send() {
                const txt = userInput.value.trim();
                if (!txt || busy) return;
                addUserMsg(txt);
                userInput.value = '';
                userInput.style.height = 'auto';
                reply(txt);
            }

            /* ═══ Add user message ═══ */
            function addUserMsg(text) {
                const row = el('div', 'msg-row user');
                row.innerHTML = `
      <div class="avatar">You</div>
      <div>
        <div class="bubble">${esc(text)}</div>
        <div class="msg-time">${now()}</div>
      </div>`;
                chatArea.appendChild(row);
                scroll();
            }

            /* ═══ Add AI message ═══ */
            function addAIMsg(label, html, cites) {
                const row = el('div', 'msg-row ai');
                let citeHTML = '';
                if (cites && cites.length) {
                    citeHTML = '<div class="citations">' +
                        cites.map(c => `<span class="cite">${esc(c)}</span>`).join('') +
                        '</div>';
                }
                const labelHTML = label ? `<div class="msg-label">${esc(label)}</div>` : '';
                row.innerHTML = `
      <div class="avatar">N</div>
      <div>
        ${labelHTML}
        <div class="bubble">${html}${citeHTML}</div>
        <div class="msg-time">${now()}</div>
      </div>`;
                chatArea.appendChild(row);
                scroll();
                return row;
            }

            /* ═══ Suggestion chips ═══ */
            function addChips(suggestions) {
                const wrap = el('div', 'chips');
                suggestions.forEach(s => {
                    const chip = el('button', 'chip');
                    chip.textContent = s;
                    chip.addEventListener('click', () => {
                        userInput.value = s;
                        userInput.focus();
                        userInput.style.height = 'auto';
                        userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
                        wrap.remove();
                    });
                    wrap.appendChild(chip);
                });
                chatArea.appendChild(wrap);
                scroll();
            }

            /* ═══ Typing indicator ═══ */
            function showTyping() {
                const row = el('div', 'typing-row');
                row.id = 'typing-indicator';
                row.innerHTML = `
      <div class="avatar" style="background:var(--gold);color:var(--navy)">N</div>
      <div class="typing-dots"><span></span><span></span><span></span></div>`;
                chatArea.appendChild(row);
                scroll();
            }

            function hideTyping() {
                const t = document.getElementById('typing-indicator');
                if (t) t.remove();
            }

            /* ═══ Reply engine ═══ */
            const API_URL = "PASTE_BACKEND_URL_HERE/ask";

            async function reply(text) {
                busy = true;
                showTyping();
                try {
                    const res = await fetch(API_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            messages: [{ role: "user", content: text }]
                        })
                    });
                    const data = await res.json();
                    hideTyping();
                    addAIMsg("Legal Guidance", data.response, data.citations || []);
                } catch (err) {
                    hideTyping();
                    const r = matchResponse(text.toLowerCase());
                    addAIMsg(r.label, r.html, r.cites);
                }
                busy = false;
            }

            function matchResponse(q) {
                if (/arrest/.test(q)) {
                    return {
                        label: 'Your Rights Under Indian Law',
                        html: `Under <strong>Section 41 of CrPC</strong>, police can arrest without warrant only for cognizable offences. Your rights are:<br><br>
<strong>1.</strong> Know the reason for arrest <em>[CrPC §50]</em><br>
<strong>2.</strong> Inform a family member <em>[CrPC §50A]</em><br>
<strong>3.</strong> See a lawyer immediately <em>[Constitution Art.22]</em><br>
<strong>4.</strong> Request medical examination <em>[CrPC §54]</em><br>
<strong>5.</strong> Ask for bail if bailable offence <em>[CrPC §436]</em><br><br>
⚡ <strong>Tip:</strong> Remain calm, ask for the arrest memo, note the officers' names, and contact NALSA helpline <strong>15100</strong> for free legal aid.`,
                        cites: ['CrPC §41', 'CrPC §50', 'CrPC §50A', 'CrPC §54', 'Art. 22', 'CrPC §436']
                    };
                }

                if (/salary|wage|pay/.test(q)) {
                    return {
                        label: 'Labour & Wage Protection',
                        html: `Under <strong>Payment of Wages Act 1936</strong>, your employer must pay by the 7th of every month. Steps to take:<br><br>
<strong>1.</strong> File complaint with District Labour Commissioner <em>[PWA §15]</em><br>
<strong>2.</strong> File <em>IPC §420</em> if deception was involved<br>
<strong>3.</strong> Approach Labour Court — no lawyer needed for claims under ₹10,000<br><br>
📞 Call <strong>SHRAM helpline 14434</strong> for immediate assistance with worker grievances.`,
                        cites: ['PWA §15', 'IPC §420', 'Labour Court']
                    };
                }

                if (/harass|online|cyber|stalk/.test(q)) {
                    return {
                        label: 'Cyber Crime & Online Safety',
                        html: `Online harassment is punishable under:<br><br>
<strong>1.</strong> <em>IT Act §66C</em> — identity theft online<br>
<strong>2.</strong> <em>IPC §354D</em> — cyberstalking, up to 3 years jail<br>
<strong>3.</strong> <em>IPC §507</em> — criminal intimidation<br><br>
<strong>Steps:</strong> Screenshot evidence → file at cyber police station → report at <a href="https://cybercrime.gov.in" target="_blank" style="color:var(--gold);font-weight:600">cybercrime.gov.in</a><br><br>
🛡️ Call <strong>National Cyber Crime Helpline 1930</strong> for immediate help.`,
                        cites: ['IT Act §66C', 'IPC §354D', 'IPC §507', 'cybercrime.gov.in']
                    };
                }

                if (/bail/.test(q)) {
                    return {
                        label: 'Bail Provisions & Legal Aid',
                        html: `Bail depends on the offence type:<br><br>
<strong>1.</strong> <strong>Bailable offence</strong> — you have a <em>right</em> to bail, request at police station <em>[CrPC §436]</em><br>
<strong>2.</strong> <strong>Non-bailable</strong> — apply before magistrate or sessions court <em>[CrPC §437]</em><br>
<strong>3.</strong> <strong>Anticipatory bail</strong> — apply before arrest in Sessions Court <em>[CrPC §438]</em><br><br>
Cannot afford a lawyer? Ask the court for a free <strong>Legal Aid lawyer under NALSA</strong>. Call helpline <strong>15100</strong>.`,
                        cites: ['CrPC §436', 'CrPC §437', 'CrPC §438', 'NALSA']
                    };
                }

                if (/consumer|product|refund|defect/.test(q)) {
                    return {
                        label: 'Consumer Protection',
                        html: `The <strong>Consumer Protection Act, 2019</strong> gives you powerful rights:<br><br>
<strong>1.</strong> File a complaint at District, State, or National Consumer Forum based on claim value<br>
<strong>2.</strong> File online at <a href="https://edaakhil.nic.in" target="_blank" style="color:var(--gold);font-weight:600">edaakhil.nic.in</a> — no lawyer needed for amounts under ₹5 lakh<br>
<strong>3.</strong> Remedies include: refund, replacement, compensation for mental agony, and punitive damages<br><br>
📞 <strong>Consumer Helpline:</strong> <strong>1800-11-4000</strong> (toll-free)`,
                        cites: ['Consumer Protection Act 2019', 'edaakhil.nic.in']
                    };
                }

                if (/women|domestic|dowry|molest/.test(q)) {
                    return {
                        label: 'Women Safety & Protection',
                        html: `Indian law provides extensive protection for women:<br><br>
<strong>1.</strong> <strong>Domestic Violence Act, 2005</strong> — covers physical, emotional, economic abuse. Seek a Protection Order from the Magistrate.<br>
<strong>2.</strong> <em>IPC §498A</em> — cruelty by husband/relatives is a cognizable, non-bailable offence<br>
<strong>3.</strong> <strong>Dowry Prohibition Act</strong> — giving or taking dowry is punishable with up to 5 years<br><br>
<strong>Helplines:</strong> Women — <strong>181</strong> · Police — <strong>112</strong> · NCW WhatsApp — <strong>7217735372</strong><br><br>
🛡️ <strong>Remember:</strong> Zero FIR can be filed at <em>any</em> police station regardless of jurisdiction.`,
                        cites: ['DV Act 2005', 'IPC §498A', 'Dowry Prohibition Act']
                    };
                }

                if (/property|land|tenant|rent/.test(q)) {
                    return {
                        label: 'Property & Tenancy Law',
                        html: `Property disputes are among the most common civil matters:<br><br>
<strong>1.</strong> <strong>Verify Ownership</strong> — obtain an Encumbrance Certificate from the Sub-Registrar's office and check land records (Khasra/Khatoni)<br>
<strong>2.</strong> <strong>Tenant Rights</strong> — under State Rent Control Acts, tenants cannot be arbitrarily evicted. Eviction requires a court order.<br>
<strong>3.</strong> <strong>Dispute Resolution</strong> — file a civil suit; consider mediation under <em>CPC §89</em> for faster resolution<br><br>
🏛️ Always engage a property lawyer for due diligence before transactions.`,
                        cites: ['Transfer of Property Act', 'Rent Control Act', 'CPC §89']
                    };
                }

                if (/rti|information/.test(q)) {
                    return {
                        label: 'Right to Information',
                        html: `The <strong>RTI Act, 2005</strong> empowers every citizen to seek information from public authorities:<br><br>
<strong>1.</strong> Write an application to the PIO of the concerned department. Fee: ₹10 only.<br>
<strong>2.</strong> File online for central government: <a href="https://rtionline.gov.in" target="_blank" style="color:var(--gold);font-weight:600">rtionline.gov.in</a><br>
<strong>3.</strong> Response must come within <strong>30 days</strong> (48 hours if life/liberty involved)<br>
<strong>4.</strong> If denied, file First Appeal within 30 days, then Second Appeal to the Information Commission<br><br>
📝 Keep your question specific and focused for faster response.`,
                        cites: ['RTI Act 2005', 'Sec. 6', 'Sec. 19']
                    };
                }

                /* Default */
                return {
                    label: '',
                    html: `I understand your concern. Could you describe your situation in more detail so I can find the right law for you?<br><br>
For example, you could tell me:<br>
&nbsp;&nbsp;• What type of legal issue you're facing<br>
&nbsp;&nbsp;• Who the other parties are<br>
&nbsp;&nbsp;• Whether any legal steps have been taken<br><br>
You can also select a legal area from the sidebar to get started.`,
                    cites: []
                };
            }

            /* ═══ Helpers ═══ */
            function el(tag, cls) { const e = document.createElement(tag); e.className = cls; return e; }
            function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
            function now() { return new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' }); }
            function scroll() { requestAnimationFrame(() => chatArea.scrollTop = chatArea.scrollHeight); }

            /* ═══ Boot: welcome message ═══ */
            addAIMsg(
                '',
                `<strong>Hello!</strong> 🙏 I can help you understand your legal rights under Indian law. Ask me anything in simple language.<br><br>
<span style="font-size:.8rem;color:var(--text-mid)">Select a suggestion below or type your question.</span>`,
                []
            );
            addChips(['Arrested without warrant', 'Unpaid salary', 'Online harassment']);
        })();
    </script>
